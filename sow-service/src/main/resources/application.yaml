# Below is the hardcoded configuration for local development
spring:
  application:
    name: sow-service

  datasource:
    url: jdbc:postgresql://localhost:5432/sow_db
    username: postgres
    password: user123
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-migration-naming: true

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_schema: core

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE
    
jwt:
  public-key: classpath:keys/public_key.pem
  expiration: 86400000

storage:
  sow:
    base-path: ./data/sow

chatbot:
  service:
    url: http://localhost:8000

server:
  port: 8081
